<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#042C53" />

    <title>TrainYourAgent — Everything-AI for SMBs & Startups</title>
    <meta name="description" content="AI voice and messaging agents that actually run your business — plus marketing, lead gen, creative, infrastructure. Four years deep in AI. Built for SMBs and startups." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- v75: PrismNode favicon stack — transparent monoline SVG for capable browsers,
         high-contrast filled-navy app-icon PNGs (regenerated from favicon-source.svg with
         thicker stroke so the mark reads at 16px), PWA manifest icons, cache-bust v=3. -->
    <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png?v=3" type="image/png" sizes="32x32" />
    <link rel="icon" href="/favicon-16.png?v=3" type="image/png" sizes="16x16" />
    <link rel="icon" href="/favicon-192.png?v=3" type="image/png" sizes="192x192" />
    <link rel="icon" href="/favicon-512.png?v=3" type="image/png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" sizes="180x180" />
    <link rel="mask-icon" href="/favicon.svg?v=3" color="#042C53" />
    <link rel="manifest" href="/site.webmanifest?v=3" />
    <meta name="msapplication-TileColor" content="#042C53" />
    <meta name="msapplication-TileImage" content="/favicon-192.png?v=3" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TrainYourAgent" />
    <meta property="og:title" content="TrainYourAgent — Everything-AI for SMBs & Startups" />
    <meta property="og:description" content="AI voice agents + everything else: marketing, lead gen, creative, infra. Four years deep in AI. $20K+/mo recurring." />
    <meta property="og:url" content="https://trainyouragent.com" />
    <meta property="og:image" content="https://trainyouragent.com/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TrainYourAgent — voice and chat agents that actually run your business." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TrainYourAgent — Everything-AI for SMBs & Startups" />
    <meta name="twitter:description" content="AI voice agents + everything else: marketing, lead gen, creative, infra. Four years deep in AI." />
    <meta name="twitter:image" content="https://trainyouragent.com/og-default.png" />
    <meta name="twitter:image:alt" content="TrainYourAgent — voice and chat agents that actually run your business." />

    <!-- Canonical -->
    <link rel="canonical" href="https://trainyouragent.com" />

    <!-- v33a: Preconnects (DNS + TLS warm-up for critical 3rd parties) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://app.cal.com" />
    <link rel="preconnect" href="https://elevenlabs.io" />
    <link rel="dns-prefetch" href="https://connect.facebook.net" />

    <!-- v33a: Preload primary fonts (Inter Tight + Playfair Display) with
         display=swap so first paint is never font-blocked. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap"
      />
    </noscript>

    <!-- v33a: Critical CSS — kill layout shift before React hydrates. -->
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; padding: 0; background: #FFFFFF; color: #0B1B2B;
        font-family: 'Inter Tight', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale; }
      #root { min-height: 100vh; }
      /* Reserve space so above-the-fold layout doesn't jump on hydration. */
      .tya-skeleton-hero { min-height: 80vh; }
      /* Visually-hidden util for skip links + screen-reader text. */
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
      *:focus-visible { outline: 2px solid #185FA5; outline-offset: 2px; border-radius: 4px; }
    </style>

    <!-- Schema.org Organization + WebSite + SearchAction (sitewide root) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://trainyouragent.com/#org",
            "name": "TrainYourAgent",
            "url": "https://trainyouragent.com",
            "logo": "https://trainyouragent.com/apple-touch-icon.png",
            "description": "Everything-AI services for SMBs and startups: voice agents, marketing, lead gen, creative, infrastructure, build & scale.",
            "founder": { "@type": "Person", "name": "Alexander Mills", "sameAs": "https://www.linkedin.com/in/alexandermillsai" },
            "address": { "@type": "PostalAddress", "addressLocality": "Tampa Bay", "addressRegion": "FL", "addressCountry": "US" },
            "sameAs": ["https://www.linkedin.com/in/alexandermillsai"],
            "contactPoint": [{
              "@type": "ContactPoint",
              "telephone": "+1-813-555-0142",
              "contactType": "sales",
              "areaServed": "US",
              "availableLanguage": ["English","Spanish"]
            }]
          },
          {
            "@type": "WebSite",
            "@id": "https://trainyouragent.com/#website",
            "url": "https://trainyouragent.com",
            "name": "TrainYourAgent",
            "publisher": { "@id": "https://trainyouragent.com/#org" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://trainyouragent.com/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>

    <!-- Meta Pixel — base code.
         Pixel ID is injected at build time from META_PIXEL_ID env var via
         vite.config.ts (define block). When unset, __META_PIXEL_ID__ resolves
         to an empty string and the wrapper short-circuits — no broken pixel,
         no 404 noscript image, no console noise.

         v33a perf change: the pixel boot is deferred behind a requestIdleCallback
         (or a 1500ms setTimeout fallback) so it never blocks first paint or
         interactive. Page Lead/Schedule/Purchase fires queue up via the noop
         fbq stub until the real script loads. -->
    <script>
      (function () {
        var PIXEL_ID = "__META_PIXEL_ID__";
        // Always install a no-op fbq first so app code never throws.
        window.fbq = window.fbq || function () { (window.fbq.queue = window.fbq.queue || []).push(arguments); };
        window.fbq.queue = window.fbq.queue || [];

        if (!PIXEL_ID || PIXEL_ID === "__META_PIXEL_ID" + "__" || PIXEL_ID.length < 6) {
          window.fbq.disabled = true;
          return;
        }

        function bootPixel() {
          if (window.fbq && window.fbq.loaded) return;
          // Standard Meta Pixel base code (snippet v2.9.197) — but the queue
          // we already installed gets drained when the real fbq loads.
          !function (f, b, e, v, n, t, s) {
            n = f.fbq = function () { n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments); };
            n.push = n; n.loaded = !0; n.version = "2.0";
            n.queue = (window.fbq && window.fbq.queue) || [];
            t = b.createElement(e); t.async = !0; t.defer = !0; t.src = v;
            s = b.getElementsByTagName(e)[0]; s.parentNode.insertBefore(t, s);
          }(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
          window.fbq("init", PIXEL_ID);
          window.fbq("track", "PageView");
          window.__TYA_PIXEL_ID__ = PIXEL_ID;
        }

        // Defer until idle so the pixel never blocks first paint.
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(bootPixel, { timeout: 2500 });
        } else {
          window.setTimeout(bootPixel, 1500);
        }
      })();
    </script>
    <!-- /Meta Pixel (head) -->
  </head>
  <body>
    <!-- Meta Pixel noscript fallback. HTML5 disallows <img> inside <noscript>
         when <noscript> is in <head>, so it lives here. When the pixel ID
         isn't configured at build time the placeholder string remains and
         the <img> 404s harmlessly (Meta's tr endpoint returns 1x1 anyway). -->
    <noscript>
      <img height="1" width="1" style="display:none"
           src="https://www.facebook.com/tr?id=__META_PIXEL_ID__&ev=PageView&noscript=1"
           alt="" />
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
