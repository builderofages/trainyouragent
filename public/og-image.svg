<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E6F1FB"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#BDDAF4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#BDDAF4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brainGlow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#DCEBFA"/>
      <stop offset="100%" stop-color="#E6F1FB"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brain logo, right side -->
  <g transform="translate(840, 175) scale(4.4)">
    <circle cx="32" cy="32" r="30" fill="url(#brainGlow)"/>
    <g fill="#0C447C">
      <circle cx="20" cy="27" r="7.5"/>
      <circle cx="32" cy="21" r="8.5"/>
      <circle cx="44" cy="27" r="7.5"/>
      <circle cx="24" cy="40" r="7"/>
      <circle cx="40" cy="40" r="7"/>
      <rect x="29" y="44" width="6" height="11" rx="1.5"/>
    </g>
    <circle cx="32" cy="32" r="30" fill="none" stroke="#185FA5" stroke-width="1.5"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="120" font-family="Inter Tight, system-ui, sans-serif" font-size="36" font-weight="600" fill="#042C53" letter-spacing="-0.5">TrainYourAgent</text>

  <!-- Eyebrow -->
  <text x="80" y="260" font-family="Inter Tight, sans-serif" font-size="22" font-weight="600" fill="#185FA5" letter-spacing="3">EVERYTHING AI · FOR SMBS &amp; STARTUPS</text>

  <!-- Big headline -->
  <text x="80" y="340" font-family="Inter Tight, sans-serif" font-size="72" font-weight="600" fill="#042C53" letter-spacing="-1.5">The AI that's</text>
  <text x="80" y="420" font-family="Playfair Display, serif" font-style="italic" font-size="72" font-weight="500" fill="#042C53">actually running</text>
  <text x="80" y="500" font-family="Inter Tight, sans-serif" font-size="72" font-weight="600" fill="#042C53" letter-spacing="-1.5">your business.</text>

  <!-- Footer line -->
  <text x="80" y="580" font-family="Inter Tight, sans-serif" font-size="20" font-weight="500" fill="#185FA5">trainyouragent.com  ·  Tampa Bay, FL  ·  4 yrs in AI  ·  $20K+/mo recurring</text>
