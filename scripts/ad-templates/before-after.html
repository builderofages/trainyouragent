<!doctype html>
<html><head><meta charset="utf-8"><title>Before/After Ad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }
  body { width: var(--w, 1080px); height: var(--h, 1920px); overflow: hidden; display: flex; flex-direction: column; background: #000; color: #fff; }
  .panel { flex: 1; padding: 60px 56px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  .panel.before { background: linear-gradient(160deg, #2c1810 0%, #1f0d08 100%); }
  .panel.after  { background: linear-gradient(160deg, #053a26 0%, #0a4d33 100%); }
  .panel .tag { position: absolute; top: 28px; left: 56px; font-size: 30px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; padding: 10px 22px; border-radius: 999px; }
  .panel.before .tag { background: #ff3b30; color: #fff; }
  .panel.after  .tag { background: #34c759; color: #000; }
  .panel .label { font-size: 30px; font-weight: 500; opacity: 0.75; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .panel .big { font-size: 220px; font-weight: 800; line-height: 0.95; letter-spacing: -8px; font-feature-settings: 'tnum'; }
  .panel.before .big { color: #ff5547; }
  .panel.after  .big { color: #5ee18a; }
  .panel .big .currency { font-size: 120px; vertical-align: top; line-height: 1; margin-right: 4px; opacity: 0.85; }
  .panel .big .suffix { font-size: 80px; font-weight: 600; opacity: 0.7; letter-spacing: 0; }
  .panel .sub { font-size: 36px; font-weight: 500; margin-top: 18px; opacity: 0.9; line-height: 1.3; max-width: 90%; }
  .divider { height: 4px; background: #FFD60A; box-shadow: 0 0 24px rgba(255,214,10,0.6); position: relative; }
  .divider::after { content: '→'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #FFD60A; color: #000; font-size: 44px; font-weight: 800; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 24px rgba(255,214,10,0.4); }
  .footer { background: #042C53; padding: 24px 48px; display: flex; align-items: center; justify-content: space-between; }
  .footer .brand { font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
  .footer .brand .diamond { display: inline-block; width: 22px; height: 22px; transform: rotate(45deg); border: 3px solid #fff; }
  .footer .cta { font-size: 22px; opacity: 0.85; }
  .footer .cta strong { color: #FFD60A; }
</style></head>
<body data-w="$W" data-h="$H">
  <div class="panel before">
    <span class="tag">Before</span>
    <div class="label">$BEFORE_LABEL</div>
    <div class="big"><span class="currency">$</span>$BEFORE_NUM<span class="suffix">$BEFORE_SUFFIX</span></div>
    <div class="sub">$BEFORE_SUB</div>
  </div>
  <div class="divider"></div>
  <div class="panel after">
    <span class="tag">After</span>
    <div class="label">$AFTER_LABEL</div>
    <div class="big"><span class="currency">$</span>$AFTER_NUM<span class="suffix">$AFTER_SUFFIX</span></div>
    <div class="sub">$AFTER_SUB</div>
  </div>
  <div class="footer">
    <div class="brand"><span class="diamond"></span> TrainYourAgent</div>
    <div class="cta"><strong>21 days. Pay only when it earns.</strong></div>
  </div>
</body></html>
