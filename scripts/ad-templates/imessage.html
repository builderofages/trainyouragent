<!doctype html>
<html><head><meta charset="utf-8"><title>iMessage Ad</title>
<style>
  @font-face { font-family: 'SFPro'; src: local('SF Pro Text'), local('-apple-system'); }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; }
  body { width: var(--w, 1080px); height: var(--h, 1920px); background: #f7f7f8; display: flex; flex-direction: column; overflow: hidden; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 28px 48px 18px; font-weight: 600; font-size: 32px; color: #000; }
  .status-bar .icons { display: flex; gap: 8px; align-items: center; }
  .status-bar .icons svg { width: 28px; height: 18px; }
  .nav { display: flex; flex-direction: column; align-items: center; padding: 6px 0 14px; border-bottom: 1px solid #d6d6d8; }
  .nav .avatar { width: 88px; height: 88px; border-radius: 50%; background: linear-gradient(135deg, #042C53, #185FA5); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 38px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .nav .name { font-size: 26px; font-weight: 500; margin-top: 8px; color: #000; }
  .nav .sub { font-size: 20px; color: #8a8a8e; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .nav .green-dot { width: 10px; height: 10px; border-radius: 50%; background: #34c759; }
  .messages { flex: 1; padding: 24px 32px 32px; display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
  .ts { text-align: center; color: #8a8a8e; font-size: 18px; font-weight: 500; margin: 10px 0; }
  .ts strong { color: #3a3a3c; font-weight: 700; }
  .msg { max-width: 78%; padding: 18px 24px; border-radius: 26px; font-size: 32px; line-height: 1.28; word-wrap: break-word; }
  .msg.them { background: #e9e9eb; color: #000; align-self: flex-start; border-bottom-left-radius: 8px; }
  .msg.me { background: #007aff; color: #fff; align-self: flex-end; border-bottom-right-radius: 8px; }
  .msg.tya { background: #042C53; color: #fff; align-self: flex-start; border-bottom-left-radius: 8px; }
  .msg .sub { display: block; font-size: 22px; opacity: 0.7; margin-top: 4px; }
  .typing { padding: 18px 28px; background: #e9e9eb; border-radius: 26px; border-bottom-left-radius: 8px; align-self: flex-start; display: flex; gap: 6px; }
  .typing span { width: 12px; height: 12px; border-radius: 50%; background: #8a8a8e; }
  .footer { padding: 18px 28px 28px; background: #042C53; color: #fff; }
  .footer .brand { font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .footer .brand .diamond { display: inline-block; width: 24px; height: 24px; transform: rotate(45deg); border: 3px solid #fff; }
  .footer .cta { font-size: 20px; opacity: 0.85; margin-top: 4px; }
</style></head>
<body data-w="$W" data-h="$H">
  <div class="status-bar">
    <span>$TIME</span>
    <span class="icons">
      <svg viewBox="0 0 24 12"><circle cx="3" cy="6" r="2" fill="#000"/><circle cx="9" cy="6" r="2.4" fill="#000"/><circle cx="15.5" cy="6" r="2.8" fill="#000"/><circle cx="22.5" cy="6" r="3.2" fill="#000"/></svg>
      <span style="font-size: 28px;">5G</span>
      <svg viewBox="0 0 28 14"><rect x="0" y="2" width="22" height="10" rx="2" stroke="#000" stroke-width="1" fill="none"/><rect x="2" y="4" width="18" height="6" fill="#000"/><rect x="23" y="5" width="2" height="4" fill="#000"/></svg>
    </span>
  </div>
  <div class="nav">
    <div class="avatar">$AGENT_INITIAL</div>
    <div class="name">$AGENT_NAME</div>
    <div class="sub"><span class="green-dot"></span>Active now · Always</div>
  </div>
  <div class="messages">
    <div class="ts"><strong>$DATE</strong> · $TIME</div>
    $MESSAGES
  </div>
  <div class="footer">
    <div class="brand"><span class="diamond"></span> TrainYourAgent</div>
    <div class="cta">$CTA · trainyouragent.com/apply</div>
  </div>
</body></html>
